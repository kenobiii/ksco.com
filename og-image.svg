<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03080F"/>
      <stop offset="100%" stop-color="#0A1525"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8347A" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#E8347A" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#E8347A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8347A"/>
      <stop offset="100%" stop-color="#E8347A" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#C8D8EC" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
  </g>

  <!-- Pink glow right -->
  <ellipse cx="1000" cy="315" rx="400" ry="300" fill="url(#glow)"/>

  <!-- Scanlines -->
  <rect width="1200" height="630" fill="url(#scanlines)" opacity="0.03"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accentLine)"/>

  <!-- Bottom accent line -->
  <rect x="0" y="628" width="1200" height="2" fill="url(#accentLine)"/>

  <!-- HUD top-left info -->
  <text x="56" y="48" font-family="monospace" font-size="11" fill="#5A7090" letter-spacing="2">SYS // KSCO_V4.0 &nbsp;&nbsp; STATUS // ONLINE &nbsp;&nbsp; LOC // TORONTO_CA</text>

  <!-- HUD top-right -->
  <text x="1144" y="48" font-family="monospace" font-size="11" fill="#5A7090" letter-spacing="2" text-anchor="end">BUILD // 2026.04 &nbsp;&nbsp; UPTIME // 15Y+</text>

  <!-- Corner brackets top-left -->
  <path d="M40,72 L40,88 L56,88" stroke="#E8347A" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Corner brackets top-right -->
  <path d="M1160,72 L1160,88 L1144,88" stroke="#E8347A" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Corner brackets bottom-left -->
  <path d="M40,558 L40,542 L56,542" stroke="#E8347A" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Corner brackets bottom-right -->
  <path d="M1160,558 L1160,542 L1144,542" stroke="#E8347A" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- K Logo mark -->
  <rect x="56" y="112" width="72" height="72" rx="10" fill="#E8347A"/>
  <text x="92" y="164" font-family="Arial Black, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle">K</text>
  <!-- Logo glow -->
  <rect x="56" y="112" width="72" height="72" rx="10" fill="none" stroke="#E8347A" stroke-width="1" opacity="0.5" filter="url(#glow-filter)"/>

  <!-- KSCO label -->
  <text x="56" y="218" font-family="monospace" font-size="13" fill="#5A7090" letter-spacing="3">KEN SILVA CO.</text>

  <!-- Main headline -->
  <text x="56" y="300" font-family="Georgia, serif" font-size="72" font-weight="700" fill="white" font-style="italic">"It&apos;s dangerous</text>
  <text x="56" y="380" font-family="Georgia, serif" font-size="72" font-weight="700" fill="white" font-style="italic">to go alone!</text>
  <text x="56" y="460" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#E8347A" font-style="italic">Take this."</text>

  <!-- Attribution -->
  <text x="56" y="500" font-family="monospace" font-size="13" fill="#5A7090" letter-spacing="2">— The Legend of Zelda, 1986</text>

  <!-- Divider -->
  <rect x="56" y="525" width="200" height="1" fill="#E8347A" opacity="0.4"/>

  <!-- Tagline -->
  <text x="56" y="552" font-family="monospace" font-size="12" fill="#5A7090" letter-spacing="1">STRATEGY · PARTNERSHIPS · GAMING &amp; ESPORTS</text>

  <!-- Right side stat cards -->
  <!-- Card 1 -->
  <rect x="800" y="140" width="180" height="90" rx="6" fill="#0A1525" stroke="#1A2F4A" stroke-width="1"/>
  <rect x="800" y="140" width="180" height="2" rx="1" fill="#E8347A" opacity="0.6"/>
  <text x="818" y="172" font-family="monospace" font-size="10" fill="#5A7090" letter-spacing="2">ACTIVE MISSIONS</text>
  <text x="818" y="210" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#E8347A">8+</text>

  <!-- Card 2 -->
  <rect x="1000" y="140" width="180" height="90" rx="6" fill="#0A1525" stroke="#1A2F4A" stroke-width="1"/>
  <rect x="1000" y="140" width="180" height="2" rx="1" fill="#00FF88" opacity="0.6"/>
  <text x="1018" y="172" font-family="monospace" font-size="10" fill="#5A7090" letter-spacing="2">YEARS ACTIVE</text>
  <text x="1018" y="210" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#00FF88">15+</text>

  <!-- Card 3 -->
  <rect x="800" y="250" width="180" height="90" rx="6" fill="#0A1525" stroke="#1A2F4A" stroke-width="1"/>
  <rect x="800" y="250" width="180" height="2" rx="1" fill="#E8347A" opacity="0.6"/>
  <text x="818" y="282" font-family="monospace" font-size="10" fill="#5A7090" letter-spacing="2">CDL FANS (LIVE)</text>
  <text x="818" y="320" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#E8347A">20K</text>

  <!-- Card 4 -->
  <rect x="1000" y="250" width="180" height="90" rx="6" fill="#0A1525" stroke="#1A2F4A" stroke-width="1"/>
  <rect x="1000" y="250" width="180" height="2" rx="1" fill="#00FF88" opacity="0.6"/>
  <text x="1018" y="282" font-family="monospace" font-size="10" fill="#5A7090" letter-spacing="2">ESL REVENUE</text>
  <text x="1018" y="320" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#00FF88">8-FIG</text>

  <!-- Status bar bottom right -->
  <text x="1144" y="552" font-family="monospace" font-size="11" fill="#5A7090" letter-spacing="1" text-anchor="end">kensilvaco.com</text>

  <!-- Status dot -->
  <circle cx="820" cy="390" r="5" fill="#00FF88" opacity="0.8"/>
  <text x="834" y="394" font-family="monospace" font-size="11" fill="#00FF88" letter-spacing="2">STATUS: ACCEPTING NEW MISSIONS</text>

</svg>